<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Structure</title>
    <meta name="description" content="A basic HTML structure example using semantic HTML elements">
    <meta name="author" content="Brittany Williams">
</head>

<body>
    <header>
        <img src="images/basic-logo.png"
          alt="A logo consisting of a blue circle showing a computer screen in the middle"
          width="128" height="128">

    <nav>
        <ul>
            <li><a href="https://www.churchofjesuschrist.org/?lang=eng">The Church of Jesus
                    Christ</a></li>
            <li><a href="https://www.byupathway.edu/">BYU Pathway</a></li>
        </ul>
    </nav>
    <main>
        <h1>Basic HTML Structure</h1>
        <section>
            <h2>Heading</h2>
            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Consequuntur, alias?</p>
        </section>
        <section>
            <h2>Heading</h2>
            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Velit, id!</p>
        </section>
    </main>
    <aside>
        <img
          src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/hamilton-new-zealand/200x200/hamilton_new_zealand_temple_exterior.png"
          alt="Picture of the Hamilton New Zealand LDS Temple" width="200">

    <footer>
        <p>Brittany Williams</p>
    </footer>

</html>
